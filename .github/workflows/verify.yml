# THIN caller -> fleet-governance reusable verify (DRY CI · FLEET_BLUEPRINT §3.3).
# Triggers + concurrency live here; job body (bootstrap + gates + secret scan) from the
# shared reusable. Profile: python 3.12 (fleet-uniform), gate verify. Pure-stdlib gates.
name: verify
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
concurrency:
  group: verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    uses: drobotka/fleet-governance/.github/workflows/verify-reusable.yml@main
    with:
      python-version: "3.12"
      gate-target: "verify"
      checkout-submodules: "false"
